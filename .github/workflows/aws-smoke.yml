name: AWS Sandbox Smoke Test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "AWS sandbox base URL, for example http://52.15.50.130"
        required: true
        default: "http://52.15.50.130"

jobs:
  aws-smoke-test:
    name: AWS sandbox smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check API OpenAPI
        run: |
          curl -f "${{ inputs.base_url }}:8000/openapi.json"

      - name: Check API metrics
        run: |
          curl -f "${{ inputs.base_url }}:8000/metrics"

      - name: Check Grafana health
        run: |
          curl -f "${{ inputs.base_url }}:3000/api/health"

      - name: Check Prometheus health
        run: |
          curl -f "${{ inputs.base_url }}:9090/-/healthy"

      - name: Check Alertmanager health
        run: |
          curl -f "${{ inputs.base_url }}:9093/-/healthy"