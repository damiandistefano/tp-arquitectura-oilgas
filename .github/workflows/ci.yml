name: CI

on:
  pull_request:
    branches: [develop]
  push:
    branches:
      - main
      - develop
      - feature/**

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run static analysis
        run: |
          ruff check .

      - name: Run unit tests
        run: |
          pytest -q

      - name: Start API and check OpenAPI
        run: |
          uvicorn app.api:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          for i in {1..15}; do
            if curl -f http://127.0.0.1:8000/openapi.json; then
              echo "API up"
              break
            fi
            sleep 2
          done

          if ! curl -f http://127.0.0.1:8000/openapi.json; then
            echo "API did not start correctly"
            cat uvicorn.log
            exit 1
          fi

      - name: Build Docker image
        run: |
          docker build -t oilgas-api .

      - name: Scan Docker image vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: oilgas-api
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Run Docker container and check OpenAPI
        run: |
          docker rm -f oilgas-api-test || true

          docker run -d --name oilgas-api-test -p 8001:8000 oilgas-api

          API_UP=false
          for i in {1..15}; do
            if curl -f http://127.0.0.1:8001/openapi.json; then
              echo "Container up"
              API_UP=true
              break
            fi
            sleep 2
          done

          if [ "$API_UP" = false ]; then
            echo "Container did not start correctly"
            docker logs oilgas-api-test || true
            docker rm -f oilgas-api-test || true
            exit 1
          fi

          docker rm -f oilgas-api-test || true

      - name: Validate deployment files
        run: |
          cp .env.example .env

          bash -n scripts/deploy.sh
          bash -n scripts/rollback.sh

          test -x scripts/deploy.sh
          test -x scripts/rollback.sh
          test -x alertmanager/entrypoint.sh

          docker compose -f docker-compose.yml config
          IMAGE_TAG=ci API_PORT=8002 docker compose -f docker-compose.deploy.yml config

          if git ls-files | grep -E '(^|/)\.env$|\.pem$|\.key$'; then
            echo "Sensitive file tracked in git"
            exit 1
          fi

      - name: Validate GHCR deploy compose with local image
        run: |
          set -e

          docker tag oilgas-api ghcr.io/${{ github.repository }}/oilgas-api:ci

          cleanup() {
            COMPOSE_PROJECT_NAME=deployvalidation \
            IMAGE_TAG=ci \
            API_PORT=8002 \
            docker compose -f docker-compose.deploy.yml down || true
          }

          trap cleanup EXIT

          COMPOSE_PROJECT_NAME=deployvalidation \
          IMAGE_TAG=ci \
          API_PORT=8002 \
          docker compose -f docker-compose.deploy.yml up -d

          API_UP=false
          for i in {1..20}; do
            if curl -sf http://localhost:8002/openapi.json > /dev/null; then
              echo "Deploy compose API is healthy"
              API_UP=true
              break
            fi
            sleep 3
          done

          if [ "$API_UP" = false ]; then
            echo "Deploy compose API did not become healthy"
            COMPOSE_PROJECT_NAME=deployvalidation \
            IMAGE_TAG=ci \
            API_PORT=8002 \
            docker compose -f docker-compose.deploy.yml logs
            exit 1
          fi

      - name: Docker Compose smoke test
        if: hashFiles('docker-compose.yml') != ''
        run: |
          pkill -f uvicorn || true
          cp .env.example .env
          docker compose up -d --build
          ALL_UP=false
          for i in {1..20}; do
            if curl -sf http://localhost:8000/openapi.json && \
               curl -sf http://localhost:9090/-/healthy && \
               curl -sf http://localhost:3000/api/health && \
               curl -sf http://localhost:9093/-/healthy; then
              echo "All services up"
              ALL_UP=true
              break
            fi
            sleep 5
          done
          if [ "$ALL_UP" = false ]; then
            echo "Not all services started correctly"
            docker compose logs
            docker compose down
            exit 1
          fi

      - name: Verificar metricas de Prometheus
        if: hashFiles('docker-compose.yml') != ''
        run: |
          curl -sf http://localhost:8000/metrics | grep -q "http_requests_total"
          echo "Metricas OK"

      - name: Verificar targets de Prometheus
        if: hashFiles('docker-compose.yml') != ''
        run: |
          for i in {1..10}; do
            STATUS=$(curl -sf "http://localhost:9090/api/v1/targets" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          targets = data['data']['activeTargets']
          up = [t for t in targets if t['health'] == 'up']
          print('up' if up else 'down')
          " 2>/dev/null)
            if [ "$STATUS" = "up" ]; then
              echo "Prometheus scraping API OK"
              break
            fi
            sleep 5
          done
          if [ "$STATUS" != "up" ]; then
            echo "Prometheus no esta scrapeando la API"
            exit 1
          fi

      - name: Verificar reglas de alerta cargadas
        if: hashFiles('docker-compose.yml') != ''
        run: |
          RULES=$(curl -sf "http://localhost:9090/api/v1/rules" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          groups = data['data']['groups']
          rules = [r['name'] for g in groups for r in g['rules']]
          print(len(rules))
          " 2>/dev/null)
          if [ "$RULES" -lt 1 ]; then
            echo "No se cargaron reglas de alerta"
            exit 1
          fi
          echo "Reglas de alerta cargadas: $RULES"
          docker compose down

      - name: Push image to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag oilgas-api ghcr.io/${{ github.repository }}/oilgas-api:latest
          docker tag oilgas-api ghcr.io/${{ github.repository }}/oilgas-api:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/oilgas-api:latest
          docker push ghcr.io/${{ github.repository }}/oilgas-api:${{ github.sha }}
