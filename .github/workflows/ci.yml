name: CI

on:
  pull_request:
    branches: [develop]
  push:
    branches:
      - main
      - develop
      - feature/**

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      API_KEY: abcdef12345

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run static analysis
        run: |
          ruff check .

      - name: Run unit tests
        run: |
          pytest -q

      - name: Start API and check OpenAPI
        run: |
          uvicorn app.api:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &

          API_UP=false
          for i in {1..15}; do
            if curl -fsS http://127.0.0.1:8000/openapi.json > /dev/null; then
              echo "API up"
              API_UP=true
              break
            fi
            sleep 2
          done

          if [ "$API_UP" = false ]; then
            echo "API did not start correctly"
            cat uvicorn.log
            exit 1
          fi

      - name: Check API contract
        run: |
          curl -fsS -H "X-API-Key: $API_KEY" \
            "http://127.0.0.1:8000/api/v1/wells?date_query=2026-03-15" > /dev/null

          curl -fsS -H "X-API-Key: $API_KEY" \
            "http://127.0.0.1:8000/api/v1/forecast?id_well=POZO-001&date_start=2026-03-15&date_end=2026-03-20" > /dev/null

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://127.0.0.1:8000/api/v1/wells?date_query=2026-03-15")

          if [ "$STATUS" != "403" ]; then
            echo "Expected 403 without API key, got $STATUS"
            exit 1
          fi

          curl -fsS "http://127.0.0.1:8000/metrics" | grep -q "http_requests_total"

      - name: Build Docker image
        run: |
          docker build -t oilgas-api .

      - name: Scan Docker image vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: oilgas-api
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Run Docker container and check API
        run: |
          docker rm -f oilgas-api-test || true

          docker run -d --name oilgas-api-test -p 8001:8000 oilgas-api

          API_UP=false
          for i in {1..15}; do
            if curl -fsS http://127.0.0.1:8001/openapi.json > /dev/null; then
              echo "Container up"
              API_UP=true
              break
            fi
            sleep 2
          done

          if [ "$API_UP" = false ]; then
            echo "Container did not start correctly"
            docker logs oilgas-api-test || true
            docker rm -f oilgas-api-test || true
            exit 1
          fi

          curl -fsS -H "X-API-Key: $API_KEY" \
            "http://127.0.0.1:8001/api/v1/wells?date_query=2026-03-15" > /dev/null

          curl -fsS "http://127.0.0.1:8001/metrics" | grep -q "http_requests_total"

          docker rm -f oilgas-api-test || true

      - name: Validate deployment files
        run: |
          cp .env.example .env

          bash -n scripts/deploy.sh
          bash -n scripts/rollback.sh
          bash -n scripts/sandbox-smoke.sh
          bash -n scripts/generate_traffic.sh
          bash -n scripts/initial_setup.sh
          bash -n alertmanager/entrypoint.sh

          test -x scripts/deploy.sh
          test -x scripts/rollback.sh
          test -x alertmanager/entrypoint.sh

          docker compose -f docker-compose.yml config
          IMAGE_TAG=ci API_PORT=8002 docker compose -f docker-compose.deploy.yml config

      - name: Check tracked files and secrets
        run: |
          set -e

          TRACKED_BAD_FILES=$(
            git ls-files \
              | grep -E '(^|/)(\.env($|\.)|.*\.pem$|.*\.key$|.*\.crt$|.*\.p12$|.*\.pfx$|.*\.pyc$|__pycache__/|\.aws/|\.ssh/)' \
              | grep -vE '(^|/)\.env\.example$|(^|/)\.env\.sandbox\.example$' || true
          )

          if [ -n "$TRACKED_BAD_FILES" ]; then
            echo "Sensitive or generated files tracked in git:"
            echo "$TRACKED_BAD_FILES"
            exit 1
          fi

          if git grep -n -I -E 'BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY|AWS_SECRET_ACCESS_KEY|aws_secret_access_key' -- .; then
            echo "Potential secret content found in tracked files"
            exit 1
          fi

      - name: Validate GHCR deploy compose with local image
        run: |
          set -e

          docker tag oilgas-api ghcr.io/${{ github.repository }}/oilgas-api:ci

          cleanup() {
            COMPOSE_PROJECT_NAME=deployvalidation \
            IMAGE_TAG=ci \
            API_PORT=8002 \
            docker compose -f docker-compose.deploy.yml down || true
          }

          trap cleanup EXIT

          COMPOSE_PROJECT_NAME=deployvalidation \
          IMAGE_TAG=ci \
          API_PORT=8002 \
          docker compose -f docker-compose.deploy.yml up -d

          API_UP=false
          for i in {1..20}; do
            if curl -sf http://localhost:8002/openapi.json > /dev/null; then
              echo "Deploy compose API is healthy"
              API_UP=true
              break
            fi
            sleep 3
          done

          if [ "$API_UP" = false ]; then
            echo "Deploy compose API did not become healthy"
            COMPOSE_PROJECT_NAME=deployvalidation \
            IMAGE_TAG=ci \
            API_PORT=8002 \
            docker compose -f docker-compose.deploy.yml logs
            exit 1
          fi

      - name: Docker Compose smoke test
        if: hashFiles('docker-compose.yml') != ''
        run: |
          pkill -f uvicorn || true
          cp .env.example .env
          docker compose up -d --build

          ALL_UP=false
          for i in {1..20}; do
            if curl -sf http://localhost:8000/openapi.json > /dev/null && \
               curl -sf http://localhost:9090/-/healthy > /dev/null && \
               curl -sf http://localhost:3000/api/health > /dev/null && \
               curl -sf http://localhost:9093/-/healthy > /dev/null; then
              echo "All services up"
              ALL_UP=true
              break
            fi
            sleep 5
          done

          if [ "$ALL_UP" = false ]; then
            echo "Not all services started correctly"
            docker compose logs
            docker compose down
            exit 1
          fi

          curl -sf -H "X-API-Key: $API_KEY" \
            "http://localhost:8000/api/v1/wells?date_query=2026-03-15" > /dev/null

          curl -sf -H "X-API-Key: $API_KEY" \
            "http://localhost:8000/api/v1/forecast?id_well=POZO-001&date_start=2026-03-15&date_end=2026-03-20" > /dev/null

      - name: Verify Prometheus metrics
        if: hashFiles('docker-compose.yml') != ''
        run: |
          curl -sf http://localhost:8000/metrics | grep -q "http_requests_total"
          echo "Metrics OK"

      - name: Verify Prometheus targets
        if: hashFiles('docker-compose.yml') != ''
        run: |
          STATUS="down"

          for i in {1..10}; do
            STATUS=$(curl -sf "http://localhost:9090/api/v1/targets" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          targets = data['data']['activeTargets']
          up = [t for t in targets if t['health'] == 'up' and 'oilgas-api' in str(t)]
          print('up' if up else 'down')
          " 2>/dev/null)
            if [ "$STATUS" = "up" ]; then
              echo "Prometheus scraping API OK"
              break
            fi
            sleep 5
          done

          if [ "$STATUS" != "up" ]; then
            echo "Prometheus no está scrapeando la API"
            exit 1
          fi

      - name: Verify alert rules
        if: hashFiles('docker-compose.yml') != ''
        run: |
          RULES=$(curl -sf "http://localhost:9090/api/v1/rules" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          groups = data['data']['groups']
          rules = [r['name'] for g in groups for r in g['rules']]
          print('\\n'.join(rules))
          " 2>/dev/null)

          echo "$RULES"

          echo "$RULES" | grep -q "APIDown"
          echo "$RULES" | grep -q "HighErrorRate"
          echo "$RULES" | grep -q "HighLatency"

          docker compose down

      - name: Push image to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag oilgas-api ghcr.io/${{ github.repository }}/oilgas-api:latest
          docker tag oilgas-api ghcr.io/${{ github.repository }}/oilgas-api:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/oilgas-api:latest
          docker push ghcr.io/${{ github.repository }}/oilgas-api:${{ github.sha }}
