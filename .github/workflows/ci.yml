name: CI

on:
  pull_request:
    branches: [develop]
  push:
    branches:
      - develop
      - feature/**

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start API and check OpenAPI
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          for i in {1..15}; do
            if curl -f http://127.0.0.1:8000/openapi.json; then
              echo "API up"
              exit 0
            fi
            sleep 2
          done
          echo "API did not start correctly"
          cat uvicorn.log
          exit 1

      - name: Build Docker image
        run: |
          docker build -t oilgas-api .