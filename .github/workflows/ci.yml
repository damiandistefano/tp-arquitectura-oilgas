name: CI

on:
  pull_request:
    branches: [develop]
  push:
    branches:
      - develop
      - feature/**

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest -q

      - name: Start API and check OpenAPI
        run: |
          uvicorn app.api:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          for i in {1..15}; do
            if curl -f http://127.0.0.1:8000/openapi.json; then
              echo "API up"
              break
            fi
            sleep 2
          done

          if ! curl -f http://127.0.0.1:8000/openapi.json; then
            echo "API did not start correctly"
            cat uvicorn.log
            exit 1
          fi

      - name: Build Docker image
        run: |
          docker build -t oilgas-api .

      - name: Run Docker container and check OpenAPI
        run: |
          docker run -d --name oilgas-api-test -p 8001:8000 oilgas-api
          for i in {1..15}; do
            if curl -f http://127.0.0.1:8001/openapi.json; then
              echo "Container up"
              docker stop oilgas-api-test
              exit 0
            fi
            sleep 2
          done

          echo "Container did not start correctly"
          docker logs oilgas-api-test
          docker stop oilgas-api-test || true
          exit 1