services:
  api:
    image: ghcr.io/damiandistefano/tp-arquitectura-oilgas/oilgas-api:${IMAGE_TAG:-latest}
    container_name: oilgas-api
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s