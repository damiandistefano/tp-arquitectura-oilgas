global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: slack-default
  routes:
    - match:
        severity: critical
      receiver: slack-and-email

receivers:
  - name: slack-default
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#alertas-oilgas"
        title: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
        send_resolved: true

  - name: slack-and-email
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#alertas-oilgas"
        title: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
        send_resolved: true
    email_configs:
      - to: "${ALERT_EMAIL}"
        from: "alertmanager@oilgas.local"
        smarthost: "${SMTP_HOST}:587"
        auth_username: "${SMTP_USER}"
        auth_password: "${SMTP_PASSWORD}"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
